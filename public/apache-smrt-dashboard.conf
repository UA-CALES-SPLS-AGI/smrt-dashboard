# ============================================================
# SMRT Link Instrument Dashboard — Apache HTTPD Configuration
# ============================================================
# Copy this file to /etc/httpd/conf.d/smrt-dashboard.conf
# Adjust paths and ports as needed for your environment.
#
# Prerequisites:
#   sudo dnf install mod_proxy_html   (if not already installed)
#   sudo setsebool -P httpd_can_network_connect 1  (if SELinux)
# ============================================================

# Ensure required modules are loaded
# (these are usually enabled by default on CentOS 8)
#LoadModule proxy_module modules/mod_proxy.so
#LoadModule proxy_http_module modules/mod_proxy_http.so
#LoadModule rewrite_module modules/mod_rewrite.so

# --- Dashboard Static Files ---
# Adjust the path to where you copied the 'out/' build
Alias /smrt-dashboard /var/www/html/smrt-dashboard
<Directory /var/www/html/smrt-dashboard>
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted

    # Client-side routing support (SPA fallback)
    RewriteEngine On
    RewriteBase /smrt-dashboard/
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule . /smrt-dashboard/index.html [L]
</Directory>

# --- Reverse Proxy: SMRT Link API ---
# Maps /smrtlink-api/* -> http://localhost:9091/*
# Change localhost:9091 if your SMRT Link is on a different host/port
ProxyPreserveHost Off
ProxyPass        /smrtlink-api/ http://localhost:9091/
ProxyPassReverse /smrtlink-api/ http://localhost:9091/
ProxyTimeout 30
